<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GasSafety Pro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f8f7f4; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0cec8; border-radius: 2px; }
    textarea, input[type=text] { outline: none; font-family: inherit; resize: none; }
    button { cursor: pointer; font-family: inherit; border: none; }
    .nav-btn { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-radius: 10px; width: 100%; background: transparent; color: #8a8680; font-size: 14px; font-weight: 500; transition: all 0.15s; }
    .nav-btn:hover { background: rgba(255,255,255,0.06); color: #e8e5df; }
    .nav-btn.active { background: rgba(255,255,255,0.12); color: #ffffff; }
    .fade-in { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; letter-spacing: 0.02em; }
    .check-btn { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .check-btn:hover { transform: scale(1.1); }
    .dot-pulse { display: flex; gap: 4px; align-items: center; }
    .dot-pulse span { width: 6px; height: 6px; border-radius: 50%; background: #9a9690; animation: dp 1.2s infinite ease-in-out; }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dp { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
    @media (max-width: 768px) {
      .sidebar-desktop { display: none !important; }
      .sidebar-mobile { display: flex !important; }
      .mobile-header { display: flex !important; }
      .mobile-overlay { display: block !important; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
      .report-grid { grid-template-columns: 1fr !important; }
    }
    @media (min-width: 769px) {
      .mobile-header { display: none !important; }
      .sidebar-mobile { display: none !important; }
      .mobile-overlay { display: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SYSTEM_PROMPT_ASSISTANT = `당신은 대한민국 도시가스 안전관리 전문가입니다. KGS FU551, GC208, GC201 등 한국가스안전공사(KGS) 코드를 기반으로 답변하십시오. 전문적이고 법규에 근거한 답변을 제공하며, 명확한 이격거리 수치와 조항 번호를 반드시 포함하십시오. 답변은 한국어로 하십시오.`;
const SYSTEM_PROMPT_REPORT = `당신은 고도의 전문성을 가진 도시가스 안전관리 실무자입니다. 신뢰감 있고 기술적인 용어를 사용하여 기술 보고서를 작성하십시오. 개조식을 활용하여 가독성을 높이십시오. 보고서는 한국어로 작성하십시오.`;

const DEFAULT_CHECKS = [
  { id: 1,  category: "가스계량기", task: "설치 높이 적정성 (1.6m~2.0m)",    status: "none", kgs: "FU551 2.4.4.3" },
  { id: 2,  category: "가스계량기", task: "전기 접속기 이격거리 (30cm 이상)", status: "none", kgs: "FU551 2.4.4.3" },
  { id: 3,  category: "가스계량기", task: "설치 장소 환기 양호 여부",          status: "none", kgs: "FU551 2.4.4.1" },
  { id: 4,  category: "배관",       task: "노출배관 도색 및 부식 상태",        status: "none", kgs: "FU551 2.5.4"   },
  { id: 5,  category: "배관",       task: "배관 고정 클램프 간격 적정",        status: "none", kgs: "FU551 2.5.3"   },
  { id: 12, category: "배관",       task: "전기시설물과 이격거리 적정",        status: "none", kgs: "FU551 2.5.6"   },
  { id: 6,  category: "가스보일러", task: "배기통 이탈방지 및 굴곡부 확인",   status: "none", kgs: "GC208 2.3.1"   },
  { id: 7,  category: "가스보일러", task: "CO 경보기 설치 및 작동 여부",      status: "none", kgs: "GC208"         },
  { id: 11, category: "가스보일러", task: "물배관 연결 여부 확인",             status: "none", kgs: "GC208 2.2.1"   },
  { id: 8,  category: "정압기",     task: "안전밸브 작동 여부 확인",          status: "none", kgs: "FU551 2.3.2"   },
  { id: 9,  category: "정압기",     task: "가스필터 이물질 확인",             status: "none", kgs: "FU551 2.3.4"   },
  { id: 10, category: "정압기",     task: "OPCO 작동 여부 확인",              status: "none", kgs: "FU551 2.3.3"   },
];

async function callClaude(messages, systemPrompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: systemPrompt, messages }),
  });
  if (!res.ok) throw new Error("API error");
  const data = await res.json();
  return data.content?.[0]?.text || "응답을 받을 수 없습니다.";
}

const SVG = {
  shield: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  chat:   <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
  file:   <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
  check:  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 5"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
  send:   <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
  alert:  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  zap:    <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  arrow:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  plus:   <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  dl:     <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  menu:   <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
  x:      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  hat:    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 18h20v2H2z"/><path d="M18 18V9l-6-6-6 6v9"/></svg>,
  ok:     <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  fail:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  trash:  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
  chevron:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
  circle: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/></svg>,
};

function App() {
  const [tab, setTab] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [chatMsgs, setChatMsgs] = useState([{ role: "assistant", content: "안녕하세요! 도시가스 안전관리 AI 비서입니다.\nKGS FU551 등 기술기준에 대해 궁금한 점을 물어보세요." }]);
  const [userInput, setUserInput] = useState("");
  const [typing, setTyping] = useState(false);
  const chatEndRef = useRef(null);
  const [reportInput, setReportInput] = useState({ activity: "", results: "", manager: "안전관리자" });
  const [report, setReport] = useState("");
  const [genLoading, setGenLoading] = useState(false);
  const [checks, setChecks] = useState(DEFAULT_CHECKS);
  const [newTask, setNewTask] = useState({ category: "", task: "", kgs: "" });
  const [showAdd, setShowAdd] = useState(false);
  const [deleteMode, setDeleteMode] = useState(false);
  const [expandedCats, setExpandedCats] = useState(["가스계량기"]);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chatMsgs, typing]);

  const passCount = checks.filter(c => c.status === "pass").length;
  const failCount = checks.filter(c => c.status === "fail").length;

  async function sendMsg() {
    if (!userInput.trim()) return;
    const msgs = [...chatMsgs, { role: "user", content: userInput }];
    setChatMsgs(msgs); setUserInput(""); setTyping(true);
    try {
      const reply = await callClaude(msgs.map(m => ({ role: m.role, content: m.content })), SYSTEM_PROMPT_ASSISTANT);
      setChatMsgs([...msgs, { role: "assistant", content: reply }]);
    } catch { setChatMsgs([...msgs, { role: "assistant", content: "오류가 발생했습니다. 잠시 후 다시 시도해주세요." }]); }
    finally { setTyping(false); }
  }

  async function genReport() {
    if (!reportInput.activity) return;
    setGenLoading(true);
    try {
      const prompt = `주요 활동: ${reportInput.activity}\n결과/특이사항: ${reportInput.results}\n작성자: ${reportInput.manager}\n\n위 내용을 전문적인 도시가스 안전관리 기술 보고서 형식으로 다듬어주세요.`;
      setReport(await callClaude([{ role: "user", content: prompt }], SYSTEM_PROMPT_REPORT));
    } catch { setReport("보고서 생성 중 오류가 발생했습니다."); }
    finally { setGenLoading(false); }
  }

  function cycleCheck(id) {
    setChecks(checks.map(c => c.id !== id ? c : { ...c, status: c.status === "none" ? "pass" : c.status === "pass" ? "fail" : "none" }));
  }
  function deleteItem(id) { setChecks(checks.filter(c => c.id !== id)); }
  function addTask() {
    if (!newTask.task) return;
    setChecks([...checks, { ...newTask, id: Date.now(), status: "none" }]);
    setNewTask({ category: "", task: "", kgs: "" }); setShowAdd(false);
  }
  function toggleCat(cat) {
    setExpandedCats(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]);
  }

  const navItems = [
    { id: "dashboard", icon: SVG.shield, label: "대시보드" },
    { id: "assistant", icon: SVG.chat,   label: "KGS 기술 비서" },
    { id: "report",    icon: SVG.file,   label: "보고서 생성기" },
    { id: "checklist", icon: SVG.check,  label: "현장 점검표" },
  ];

  const SidebarContent = ({ onNav }) => (
    <>
      <nav style={{ padding: "12px 10px", flex: 1 }}>
        {navItems.map(n => (
          <button key={n.id} className={`nav-btn ${tab === n.id ? "active" : ""}`} onClick={() => { setTab(n.id); onNav && onNav(); }}>
            {n.icon}<span>{n.label}</span>
          </button>
        ))}
      </nav>
      <div style={{ padding: "12px 10px 20px", borderTop: "1px solid rgba(255,255,255,0.07)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: "rgba(255,255,255,0.06)", borderRadius: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: "50%", background: "#e8562a22", border: "1px solid #e8562a55", display: "flex", alignItems: "center", justifyContent: "center", color: "#e8562a" }}>{SVG.hat}</div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#e0ddd8" }}>안전관리자</div>
            <div style={{ fontSize: 11, color: "#5a5854", marginTop: 1 }}>● 활동 중</div>
          </div>
        </div>
      </div>
    </>
  );

  const Logo = () => (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ width: 34, height: 34, borderRadius: 9, background: "#e8562a", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>{SVG.shield}</div>
      <span style={{ fontWeight: 700, fontSize: 16, color: "#f0ede8" }}>GasSafety Pro</span>
    </div>
  );

  return (
    <div style={{ display: "flex", height: "100vh", background: "#f8f7f4", overflow: "hidden", color: "#1a1a1a" }}>

      {/* 데스크탑 사이드바 */}
      <aside className="sidebar-desktop" style={{ width: 230, background: "#1c1b18", display: "flex", flexDirection: "column", flexShrink: 0, borderRight: "1px solid rgba(255,255,255,0.06)" }}>
        <div style={{ padding: "24px 20px 20px", borderBottom: "1px solid rgba(255,255,255,0.07)" }}><Logo /></div>
        <SidebarContent />
      </aside>

      {/* 모바일 헤더 */}
      <div className="mobile-header" style={{ display: "none", position: "fixed", top: 0, left: 0, right: 0, zIndex: 50, background: "#1c1b18", padding: "14px 16px", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
        <Logo />
        <button onClick={() => setSidebarOpen(true)} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 8, padding: "6px 8px", color: "#c0bdb8" }}>{SVG.menu}</button>
      </div>

      {/* 모바일 사이드바 */}
      {sidebarOpen && <>
        <div className="mobile-overlay" onClick={() => setSidebarOpen(false)} />
        <aside className="sidebar-mobile" style={{ position: "fixed", top: 0, left: 0, bottom: 0, width: 230, background: "#1c1b18", zIndex: 50, flexDirection: "column" }}>
          <div style={{ padding: "20px 16px 16px", borderBottom: "1px solid rgba(255,255,255,0.07)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Logo />
            <button onClick={() => setSidebarOpen(false)} style={{ background: "none", color: "#8a8680", padding: 4 }}>{SVG.x}</button>
          </div>
          <SidebarContent onNav={() => setSidebarOpen(false)} />
        </aside>
      </>}

      {/* 메인 */}
      <main style={{ flex: 1, overflowY: "auto" }}>
        <div style={{ maxWidth: 860, margin: "0 auto", padding: "32px 24px 60px" }} id="main-pad">
          <style>{`@media(max-width:768px){#main-pad{padding-top:72px!important}}`}</style>

          {/* ── 대시보드 ── */}
          {tab === "dashboard" && (
            <div className="fade-in">
              <div style={{ marginBottom: 28 }}>
                <h2 style={{ fontSize: 26, fontWeight: 700, color: "#1a1918", letterSpacing: "-0.02em" }}>안전관리 현황</h2>
                <p style={{ fontSize: 14, color: "#8a8680", marginTop: 4 }}>오늘의 점검 현황 및 주요 알림을 확인하세요.</p>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,1fr))", gap: 14, marginBottom: 24 }}>
                {[
                  { label: "점검 완료율", value: `${checks.length ? Math.round(((passCount+failCount)/checks.length)*100) : 0}%`, color: "#1a6ef5", sub: `${passCount+failCount} / ${checks.length} 항목` },
                  { label: "부적합 사항", value: `${failCount}건`, color: "#e8562a", sub: "점검 항목 중 불합격" },
                  { label: "자격 유지",   value: "적합",           color: "#22a06b", sub: "차기 보수교육: 2026.11" },
                ].map((c, i) => (
                  <div key={i} style={{ background: "#fff", borderRadius: 14, padding: "20px 22px", border: "1px solid #ebe9e4", borderLeft: `4px solid ${c.color}` }}>
                    <div style={{ fontSize: 12, fontWeight: 500, color: "#8a8680", marginBottom: 8 }}>{c.label}</div>
                    <div style={{ fontSize: 28, fontWeight: 700, color: c.color, letterSpacing: "-0.03em" }}>{c.value}</div>
                    <div style={{ fontSize: 11, color: "#b0ada8", marginTop: 6 }}>{c.sub}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: "#1c1b18", borderRadius: 18, padding: "32px 36px", color: "#fff", position: "relative", overflow: "hidden", marginBottom: 24 }}>
                <div style={{ position: "absolute", right: -20, bottom: -20, color: "rgba(255,255,255,0.05)" }}>{SVG.zap}</div>
                <div style={{ position: "relative", zIndex: 1 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#e8562a", letterSpacing: "0.08em", marginBottom: 10, textTransform: "uppercase" }}>AI 기반 코드 검색</div>
                  <h3 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8, lineHeight: 1.3 }}>스마트 KGS 기술 비서</h3>
                  <p style={{ fontSize: 14, color: "#8a8680", marginBottom: 22, lineHeight: 1.6 }}>복잡한 가스기술기준, 이제 검색하지 말고 AI에게 바로 물어보세요.</p>
                  <button onClick={() => setTab("assistant")} style={{ background: "#e8562a", color: "#fff", padding: "11px 22px", borderRadius: 10, fontSize: 14, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 8 }}>
                    지금 질문하기 {SVG.arrow}
                  </button>
                </div>
              </div>
              <div style={{ background: "#fff8f5", border: "1px solid #fdd5c5", borderRadius: 14, padding: "16px 20px", display: "flex", gap: 12, alignItems: "flex-start" }}>
                <span style={{ color: "#e8562a", flexShrink: 0, marginTop: 1 }}>{SVG.alert}</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#c44020", marginBottom: 4 }}>동절기 CO 중독 예방 주의</div>
                  <div style={{ fontSize: 13, color: "#a03018", lineHeight: 1.6 }}>주거용 가스보일러의 배기통 끝단 상향 설치(FF방식) 및 CO 경보기 작동 여부를 반드시 확인하시기 바랍니다. (GC208 2.3.1)</div>
                </div>
              </div>
            </div>
          )}

          {/* ── KGS 비서 ── */}
          {tab === "assistant" && (
            <div className="fade-in" style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 80px)" }}>
              <div style={{ marginBottom: 16 }}>
                <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>KGS Code 기술 비서</h2>
                <p style={{ fontSize: 13, color: "#8a8680", marginTop: 3 }}>KGS FU551 · GC208 · GC201 실시간 질의응답</p>
              </div>
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #ebe9e4", flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                <div style={{ flex: 1, overflowY: "auto", padding: "20px 20px 12px" }}>
                  {chatMsgs.map((m, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 12 }}>
                      {m.role === "assistant" && (
                        <div style={{ width: 28, height: 28, borderRadius: 8, background: "#e8562a", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", flexShrink: 0, marginRight: 10, marginTop: 2 }}>{SVG.shield}</div>
                      )}
                      <div style={{ maxWidth: "78%", background: m.role === "user" ? "#1c1b18" : "#f4f2ef", color: m.role === "user" ? "#f0ede8" : "#2a2826", borderRadius: m.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px", padding: "12px 16px", fontSize: 14, lineHeight: 1.65, whiteSpace: "pre-wrap" }}>
                        {m.content}
                      </div>
                    </div>
                  ))}
                  {typing && (
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                      <div style={{ width: 28, height: 28, borderRadius: 8, background: "#e8562a", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", flexShrink: 0 }}>{SVG.shield}</div>
                      <div style={{ background: "#f4f2ef", borderRadius: "14px 14px 14px 4px", padding: "14px 18px" }}>
                        <div className="dot-pulse"><span/><span/><span/></div>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef} />
                </div>
                <div style={{ padding: "12px 16px", borderTop: "1px solid #ebe9e4" }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <div style={{ flex: 1, background: "#f4f2ef", borderRadius: 12, padding: "10px 14px", display: "flex", alignItems: "center" }}>
                      <input type="text" value={userInput} onChange={e => setUserInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendMsg()} placeholder="예: 배관과 전기콘센트 이격거리는?" style={{ flex: 1, background: "none", border: "none", fontSize: 14, color: "#1a1918" }} />
                    </div>
                    <button onClick={sendMsg} disabled={typing} style={{ width: 42, height: 42, borderRadius: 11, background: typing ? "#ccc" : "#e8562a", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      {SVG.send}
                    </button>
                  </div>
                  <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                    {["계량기 이격거리", "배관 매설 깊이", "정압기 유지 기준"].map(q => (
                      <button key={q} onClick={() => setUserInput(q)} style={{ fontSize: 12, background: "#f0ede8", color: "#6a6864", padding: "5px 10px", borderRadius: 20, border: "1px solid #dedad4" }}>{q}</button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── 보고서 ── */}
          {tab === "report" && (
            <div className="fade-in">
              <div style={{ marginBottom: 20 }}>
                <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>AI 보고서 생성기</h2>
                <p style={{ fontSize: 13, color: "#8a8680", marginTop: 3 }}>업무 내용을 입력하면 전문 기술 보고서로 변환합니다.</p>
              </div>
              <div className="report-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #ebe9e4", padding: 24 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#4a4845", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>{SVG.file} <span>활동 내용 입력</span></div>
                  {[
                    { label: "주요 수행 업무 *", field: "activity", rows: 5, ph: "예: 정압기 분해 점검 참관 및 단지 내 사용자 시설 특별 안전 점검" },
                    { label: "특이사항 및 결과",  field: "results",  rows: 3, ph: "예: 가스 누출 없음 확인, 노후 밸브 1개소 교체 권고" },
                  ].map(({ label, field, rows, ph }) => (
                    <div key={field} style={{ marginBottom: 14 }}>
                      <label style={{ fontSize: 12, fontWeight: 500, color: "#8a8680", display: "block", marginBottom: 6 }}>{label}</label>
                      <textarea value={reportInput[field]} onChange={e => setReportInput({ ...reportInput, [field]: e.target.value })} rows={rows} placeholder={ph} style={{ width: "100%", background: "#f8f7f4", border: "1px solid #e5e3de", borderRadius: 10, padding: "10px 12px", fontSize: 13, color: "#1a1918", lineHeight: 1.6 }} />
                    </div>
                  ))}
                  <div style={{ marginBottom: 20 }}>
                    <label style={{ fontSize: 12, fontWeight: 500, color: "#8a8680", display: "block", marginBottom: 6 }}>작성자</label>
                    <input type="text" value={reportInput.manager} onChange={e => setReportInput({ ...reportInput, manager: e.target.value })} style={{ width: "100%", background: "#f8f7f4", border: "1px solid #e5e3de", borderRadius: 10, padding: "10px 12px", fontSize: 13, color: "#1a1918" }} />
                  </div>
                  <button onClick={genReport} disabled={genLoading || !reportInput.activity} style={{ width: "100%", background: genLoading ? "#ccc" : "#e8562a", color: "#fff", padding: 13, borderRadius: 11, fontSize: 14, fontWeight: 600 }}>
                    {genLoading ? "보고서 생성 중..." : "전문 보고서로 변환 →"}
                  </button>
                </div>
                <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #ebe9e4", padding: 24, display: "flex", flexDirection: "column" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#4a4845", display: "flex", alignItems: "center", gap: 8 }}>{SVG.file} <span>생성된 보고서</span></div>
                    {report && (
                      <button onClick={() => { const b = new Blob([report],{type:"text/plain"}); const u = URL.createObjectURL(b); const a = document.createElement("a"); a.href=u; a.download="안전관리보고서.txt"; a.click(); }} style={{ fontSize: 12, color: "#e8562a", background: "none", display: "flex", alignItems: "center", gap: 4 }}>
                        {SVG.dl} 저장
                      </button>
                    )}
                  </div>
                  <div style={{ flex: 1, background: "#f8f7f4", borderRadius: 10, border: "1px dashed #dedad4", padding: 16, overflowY: "auto", minHeight: 300 }}>
                    {report
                      ? <pre style={{ whiteSpace: "pre-wrap", fontFamily: "'Pretendard',sans-serif", fontSize: 13, color: "#2a2826", lineHeight: 1.75 }}>{report}</pre>
                      : <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#c0bdb8", gap: 8 }}><span style={{ fontSize: 13 }}>업무 내용을 입력하고 버튼을 눌러주세요.</span></div>
                    }
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── 점검표 ── */}
          {tab === "checklist" && (
            <div className="fade-in">
              <div style={{ marginBottom: 20 }}>
                <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>현장 안전점검표</h2>
                <p style={{ fontSize: 13, color: "#8a8680", marginTop: 3 }}>KGS FU551 및 GC208 기준 핵심 점검 항목</p>
              </div>
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #ebe9e4", overflow: "hidden", marginBottom: 16 }}>
                {/* 헤더 */}
                <div style={{ padding: "18px 22px", borderBottom: "1px solid #f0ede8", display: "flex", justifyContent: "space-between", alignItems: "center", background: "#fafaf8", flexWrap: "wrap", gap: 10 }}>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 13, color: "#22a06b", fontWeight: 600 }}>✓ 합격 {passCount}건</span>
                    <span style={{ fontSize: 13, color: "#e8562a", fontWeight: 600 }}>✗ 불합격 {failCount}건</span>
                    <span style={{ fontSize: 13, color: "#8a8680" }}>미점검 {checks.length - passCount - failCount}건</span>
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => { setDeleteMode(false); setShowAdd(!showAdd); }} style={{ fontSize: 13, background: showAdd ? "#e8562a" : "#1c1b18", color: "#fff", padding: "8px 14px", borderRadius: 9, display: "flex", alignItems: "center", gap: 6, fontWeight: 500 }}>
                      {SVG.plus} 항목 추가
                    </button>
                    <button onClick={() => { setShowAdd(false); setDeleteMode(!deleteMode); }} style={{ fontSize: 13, background: deleteMode ? "#e8562a" : "#fff", color: deleteMode ? "#fff" : "#c44020", padding: "8px 14px", borderRadius: 9, display: "flex", alignItems: "center", gap: 6, fontWeight: 500, border: `1px solid ${deleteMode ? "#e8562a" : "#fdd5c5"}` }}>
                      {SVG.trash} {deleteMode ? "삭제 완료" : "항목 삭제"}
                    </button>
                  </div>
                </div>

                {/* 추가 폼 */}
                {showAdd && (
                  <div style={{ padding: "16px 22px", borderBottom: "1px solid #f0ede8", background: "#fff9f7", display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
                    {[{ph:"구분 (예: 배관)", f:"category", w:130},{ph:"점검 항목", f:"task", w:260},{ph:"KGS 코드", f:"kgs", w:130}].map(({ph,f,w}) => (
                      <input key={f} type="text" placeholder={ph} value={newTask[f]} onChange={e => setNewTask({...newTask,[f]:e.target.value})} style={{ width: w, background: "#fff", border: "1px solid #e5e3de", borderRadius: 8, padding: "8px 11px", fontSize: 13, color: "#1a1918" }} />
                    ))}
                    <button onClick={addTask} style={{ background: "#e8562a", color: "#fff", padding: "9px 16px", borderRadius: 9, fontSize: 13, fontWeight: 600 }}>추가</button>
                  </div>
                )}

                {/* 카테고리 아코디언 */}
                {[...new Set(checks.map(c => c.category))].map(cat => {
                  const items = checks.filter(c => c.category === cat);
                  const isOpen = expandedCats.includes(cat);
                  const cp = items.filter(i => i.status === "pass").length;
                  const cf = items.filter(i => i.status === "fail").length;
                  return (
                    <div key={cat} style={{ borderBottom: "1px solid #f0ede8" }}>
                      <button onClick={() => toggleCat(cat)} style={{ width: "100%", display: "flex", alignItems: "center", padding: "14px 20px", background: isOpen ? "#fff8f5" : "#fafaf8", border: "none", cursor: "pointer", gap: 12 }}>
                        <span style={{ display: "inline-block", transform: isOpen ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.2s", color: "#8a8680" }}>{SVG.chevron}</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: isOpen ? "#c44020" : "#4a4845", background: isOpen ? "#fff3f0" : "#f0ede8", padding: "4px 10px", borderRadius: 6 }}>{cat}</span>
                        <span style={{ fontSize: 12, color: "#8a8680" }}>{items.length}개 항목</span>
                        <span style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
                          {cp > 0 && <span style={{ fontSize: 11, fontWeight: 600, color: "#22a06b", background: "#edfaf4", padding: "2px 8px", borderRadius: 10 }}>✓ {cp}</span>}
                          {cf > 0 && <span style={{ fontSize: 11, fontWeight: 600, color: "#e8562a", background: "#fff0ee", padding: "2px 8px", borderRadius: 10 }}>✗ {cf}</span>}
                          {cp+cf === items.length && items.length > 0 && <span style={{ fontSize: 11, color: "#22a06b" }}>완료</span>}
                        </span>
                      </button>
                      {isOpen && (
                        <table style={{ width: "100%", borderCollapse: "collapse" }}>
                          <thead>
                            <tr style={{ background: "#fffdf9" }}>
                              {["점검 항목","결과","기술기준",...(deleteMode?["삭제"]:[])].map(h => (
                                <th key={h} style={{ padding: "9px 20px", fontSize: 11, fontWeight: 500, color: "#a0ada8", textAlign: "left", borderBottom: "1px solid #f4f2ef" }}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {items.map(item => (
                              <tr key={item.id} style={{ borderBottom: "1px solid #f7f5f2", background: deleteMode ? "#fffaf9" : "#fff" }}>
                                <td style={{ padding: "13px 20px", fontSize: 14, color: "#2a2826", fontWeight: 500 }}>
                                  <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    <span style={{ width: 4, height: 4, borderRadius: "50%", background: "#e8562a", flexShrink: 0, display: "inline-block" }} />
                                    {item.task}
                                  </span>
                                </td>
                                <td style={{ padding: "13px 20px" }}>
                                  <button className="check-btn" onClick={() => !deleteMode && cycleCheck(item.id)} style={{ background: item.status==="pass"?"#edfaf4":item.status==="fail"?"#fff0ee":"#f4f2ef", color: item.status==="pass"?"#22a06b":item.status==="fail"?"#e8562a":"#b0ada8", border: `1.5px solid ${item.status==="pass"?"#c0ecd8":item.status==="fail"?"#fdd5c5":"#e5e3de"}`, opacity: deleteMode?0.4:1, cursor: deleteMode?"default":"pointer" }}>
                                    {item.status==="pass" ? SVG.ok : item.status==="fail" ? SVG.fail : SVG.circle}
                                  </button>
                                </td>
                                <td style={{ padding: "13px 20px", fontSize: 12, color: "#b0ada8", fontStyle: "italic" }}>KGS {item.kgs}</td>
                                {deleteMode && (
                                  <td style={{ padding: "13px 20px" }}>
                                    <button onClick={() => deleteItem(item.id)} style={{ width: 30, height: 30, borderRadius: 7, background: "#fff0ee", color: "#e8562a", border: "1px solid #fdd5c5", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}
                                      onMouseOver={e=>{e.currentTarget.style.background="#e8562a";e.currentTarget.style.color="#fff";}}
                                      onMouseOut={e=>{e.currentTarget.style.background="#fff0ee";e.currentTarget.style.color="#e8562a";}}>
                                      {SVG.trash}
                                    </button>
                                  </td>
                                )}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      )}
                    </div>
                  );
                })}

                <div style={{ padding: "16px 22px", display: "flex", justifyContent: "flex-end" }}>
                  <button style={{ background: "#1c1b18", color: "#fff", padding: "12px 28px", borderRadius: 11, fontSize: 14, fontWeight: 600 }}>점검 완료 및 저장</button>
                </div>
              </div>

              <div style={{ background: "#fff8f5", border: "1px solid #fdd5c5", borderRadius: 14, padding: "16px 20px", display: "flex", gap: 12, alignItems: "flex-start" }}>
                <span style={{ color: "#e8562a", flexShrink: 0, marginTop: 1 }}>{SVG.alert}</span>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#c44020", marginBottom: 4 }}>중요 안전 알림</div>
                  <div style={{ fontSize: 13, color: "#a03018", lineHeight: 1.6 }}>동절기 일산화탄소 중독 사고 예방을 위해 주거용 가스보일러의 배기통 끝단 상향 설치(FF방식) 여부를 반드시 확인하시기 바랍니다. (GC208 2.3.1)</div>
                </div>
              </div>
            </div>
          )}

        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
